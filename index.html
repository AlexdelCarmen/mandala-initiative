<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Mandala Initiative</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.google.com/share?selection.family=Lora:ital,wght@0,400..700;1,400..700|Playfair+Display:ital,wght@0,400..900;1,400..900"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  </head>
  <body>
    <div class="app-container">
      <header>
        <h1>The Mandala Initiative</h1>
        <p>by Drawing a Circle</p>
      </header>

      <main>
        <div class="canvas-panel">
          <canvas id="canvas" width="750" height="750"></canvas>
        </div>

        <div class="controls-panel">
          <section class="control-group">
            <h2>Generate</h2>
            <button id="generate">Generate Mandala</button>
          </section>

          <section class="control-group">
            <h2>Export</h2>
            <button id="export">Save as PNG</button>
            <button id="export-pdf">Export to PDF</button>
          </section>

          <section class="control-group">
            <h2>Style</h2>
            <!-- aquí van los sliders de complejidad etc después -->
          </section>
        </div>
      </main>
    </div>
  </body>
  <script src="./script.js"></script>
</html>
